<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strona główna</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/png" sizes="64x64" href="/images/favicon.png">

<body>
    <div class="container">
        <h1>🚀 Serwer Node.js</h1>
        <p class="subtitle">Serwer z routerem i danymi statystycznymi</p>

        <div class="card">
            <h2>📁 Pliki statyczne</h2>
            <ul>
                <li>✅ <strong>CSS</strong> - <a href="/css/style.css">style.css</a></li>

            <h2>🖼️ Obrazy</h2>
            <div class="image-grid">
                <img src="https://picsum.photos/seed/1/150/150" alt="Obraz 1">

        </div>
        
        <footer>
            <p>&copy; 2026 Wszystkie prawa zastrzeżone</p>
